<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murder Drones 3D - Copper-9</title>
  <meta name="description" content="Murder Drones 3D oyunu - Copper-9 gezegeninde hayatta kal, savaş ve hikayeyi keşfet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background-color: #050510; font-family: 'Rajdhani', sans-serif; color: white; }

    /* ── Game Container ── */
    #game-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

    /* ── Loading Screen ── */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #050510 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 200; transition: opacity 0.6s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-title { font-family: 'Orbitron', monospace; font-size: 28px; color: #9B59B6; letter-spacing: 6px; margin-bottom: 30px; }
    .loading-bar-bg { width: 300px; height: 4px; background: rgba(155,89,182,0.15); border-radius: 2px; overflow: hidden; }
    .loading-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #9B59B6, #BB7DE8); border-radius: 2px; transition: width 0.3s; }
    .loading-text { font-size: 14px; color: rgba(155,89,182,0.6); margin-top: 12px; letter-spacing: 3px; }

    /* ── Start Screen ── */
    #start-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at 30% 70%, rgba(80,20,100,0.2) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 30%, rgba(20,20,80,0.25) 0%, transparent 60%),
                  linear-gradient(180deg, #050510 0%, #0a0820 50%, #050510 100%);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 100;
    }
    .start-particles { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
    .start-logo {
      font-family: 'Orbitron', monospace; font-size: 56px; font-weight: 900;
      background: linear-gradient(135deg, #9B59B6 0%, #BB7DE8 40%, #FFD700 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none; letter-spacing: 4px; margin-bottom: 8px;
      animation: logoGlow 3s ease-in-out infinite alternate;
    }
    @keyframes logoGlow {
      0% { filter: drop-shadow(0 0 10px rgba(155,89,182,0.4)); }
      100% { filter: drop-shadow(0 0 25px rgba(155,89,182,0.7)); }
    }
    .start-subtitle {
      font-family: 'Orbitron', monospace; font-size: 14px; color: rgba(155,89,182,0.5);
      letter-spacing: 12px; text-transform: uppercase; margin-bottom: 50px;
    }
    .start-tagline { font-size: 20px; color: rgba(200,200,220,0.7); margin-bottom: 40px; letter-spacing: 2px; }
    #start-btn {
    margin-top: 10px;
    padding: 14px 56px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Orbitron', monospace;
    background: linear-gradient(135deg, rgba(0,150,255,0.2) 0%, rgba(0,150,255,0.1) 100%);
    color: #00A0FF;
    border: 1px solid rgba(0,150,255,0.4);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 4px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  /* ── Skip Button ── */
  #skip-btn {
    margin-top: 10px;
    padding: 14px 56px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Orbitron', monospace;
    background: linear-gradient(135deg, rgba(255,140,0,0.2) 0%, rgba(255,140,0,0.1) 100%);
    color: #FF8C00;
    border: 1px solid rgba(255,140,0,0.4);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 4px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  #skip-btn:hover {
    background: linear-gradient(135deg, rgba(255,140,0,0.35) 0%, rgba(255,140,0,0.2) 100%);
    border-color: rgba(255,140,0,0.7);
    color: #fff;
    box-shadow: 0 0 30px rgba(255,140,0,0.3), inset 0 0 15px rgba(255,140,0,0.1);
    transform: translateY(-2px);
  }
    /* ── Explore Button ── */
  #explore-btn {
    margin-top: 10px;
    padding: 14px 56px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Orbitron', monospace;
    background: linear-gradient(135deg, rgba(0,200,100,0.2) 0%, rgba(0,200,100,0.1) 100%);
    color: #00C864;
    border: 1px solid rgba(0,200,100,0.4);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 4px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  #explore-btn:hover {
    background: linear-gradient(135deg, rgba(0,200,100,0.35) 0%, rgba(0,200,100,0.2) 100%);
    border-color: rgba(0,200,100,0.7);
    color: #fff;
    box-shadow: 0 0 30px rgba(0,200,100,0.3), inset 0 0 15px rgba(0,200,100,0.1);
    transform: translateY(-2px);
  }
    #start-btn:hover {
      background: linear-gradient(135deg, rgba(155,89,182,0.35) 0%, rgba(155,89,182,0.2) 100%);
      border-color: rgba(155,89,182,0.7); color: #fff;
      box-shadow: 0 0 30px rgba(155,89,182,0.3), inset 0 0 15px rgba(155,89,182,0.1);
      transform: translateY(-2px);
    }
    #start-btn::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(155,89,182,0.1) 50%, transparent 60%);
      animation: btnShine 3s ease-in-out infinite;
    }
    @keyframes btnShine { 0%,100% { transform: translateX(-100%); } 50% { transform: translateX(100%); } }
    .start-controls {
      margin-top: 40px; font-size: 13px; color: rgba(155,89,182,0.35); letter-spacing: 2px;
      text-align: center; line-height: 1.8;
    }
    .key-hint { display: inline-block; padding: 2px 8px; border: 1px solid rgba(155,89,182,0.25); border-radius: 3px; margin: 0 2px; font-family: 'Orbitron', monospace; font-size: 11px; }

    /* ── HUD ── */
    #hud { position: fixed; z-index: 10; pointer-events: none; display: none; }
    #hud.active { display: block; }

    /* Health bar */
    .hud-health {
      position: fixed; bottom: 30px; left: 30px;
      display: flex; align-items: center; gap: 12px;
    }
    .health-icon { font-size: 22px; }
    .health-bar-bg {
      width: 200px; height: 8px; background: rgba(255,255,255,0.08);
      border-radius: 4px; overflow: hidden; border: 1px solid rgba(155,89,182,0.2);
    }
    .health-bar {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #9B59B6, #BB7DE8);
      border-radius: 4px; transition: width 0.3s;
    }
    .health-bar.low { background: linear-gradient(90deg, #E74C3C, #FF6B6B); }
    .health-text { font-family: 'Orbitron', monospace; font-size: 16px; color: #BB7DE8; min-width: 35px; }

    /* Score / Wave */
    .hud-info {
      position: fixed; top: 20px; right: 20px;
      text-align: right;
    }
    .hud-score { font-family: 'Orbitron', monospace; font-size: 24px; color: #FFD700; letter-spacing: 2px; }
    .hud-wave { font-family: 'Orbitron', monospace; font-size: 14px; color: rgba(155,89,182,0.6); letter-spacing: 4px; margin-top: 4px; }
    .hud-location { font-size: 12px; color: rgba(155,89,182,0.3); letter-spacing: 3px; margin-top: 8px; text-transform: uppercase; }

    /* Weapon info */
    .hud-weapon {
      position: fixed; bottom: 30px; right: 30px;
      text-align: right;
    }
    .weapon-name { font-family: 'Orbitron', monospace; font-size: 14px; color: rgba(155,89,182,0.5); letter-spacing: 2px; }
    .weapon-ammo { font-family: 'Orbitron', monospace; font-size: 28px; color: #BB7DE8; margin-top: 2px; }

    /* EMP cooldown */
    .hud-emp {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
    }
    .emp-label { font-family: 'Orbitron', monospace; font-size: 11px; color: rgba(155,89,182,0.4); letter-spacing: 2px; }
    .emp-bar-bg { width: 100px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .emp-bar { width: 100%; height: 100%; background: #44AAFF; border-radius: 2px; transition: width 0.2s; }

    /* ── Crosshair ── */
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 24px; height: 24px; pointer-events: none; z-index: 15; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background-color: rgba(187,125,232,0.6);
    }
    #crosshair::before { top: 11px; left: 2px; width: 8px; height: 2px; box-shadow: 12px 0 0 rgba(187,125,232,0.6); }
    #crosshair::after { top: 2px; left: 11px; width: 2px; height: 8px; box-shadow: 0 12px 0 rgba(187,125,232,0.6); }
    .crosshair-dot {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 3px; height: 3px; background: rgba(187,125,232,0.8); border-radius: 50%;
    }

    /* ── Hit Marker ── */
    #hit-marker {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 16px; height: 16px; pointer-events: none; z-index: 16;
      opacity: 0; transition: opacity 0.1s;
    }
    #hit-marker.show { opacity: 1; }
    #hit-marker::before, #hit-marker::after {
      content: ''; position: absolute; background: #FFD700;
    }
    #hit-marker::before { top: 7px; left: 0; width: 16px; height: 2px; }
    #hit-marker::after { top: 0; left: 7px; width: 2px; height: 16px; }

    /* ── Game Over ── */
    #game-over {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at center, rgba(20,5,5,0.95) 0%, rgba(5,5,10,0.98) 100%);
      flex-direction: column; justify-content: center; align-items: center; z-index: 50;
    }
    .go-title { font-family: 'Orbitron', monospace; font-size: 48px; color: #E74C3C; letter-spacing: 8px; margin-bottom: 20px; }
    .go-score { font-family: 'Orbitron', monospace; font-size: 20px; color: rgba(200,200,220,0.5); letter-spacing: 4px; margin-bottom: 40px; }
    #restart-btn {
      padding: 14px 50px; font-size: 16px; font-weight: 700; font-family: 'Orbitron', monospace;
      background: rgba(231,76,60,0.15); color: #E74C3C; border: 1px solid rgba(231,76,60,0.4);
      border-radius: 4px; cursor: pointer; letter-spacing: 4px; text-transform: uppercase;
      transition: all 0.3s;
    }
    #restart-btn:hover { background: rgba(231,76,60,0.3); border-color: #E74C3C; color: #fff; }

    /* ── Story Banner ── */
    #story-banner {
      position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
      font-family: 'Orbitron', monospace; font-size: 18px; color: #BB7DE8;
      letter-spacing: 4px; text-align: center; z-index: 20; pointer-events: none;
      opacity: 0; transition: opacity 0.8s;
    }
    #story-banner.show { opacity: 1; }
    .banner-sub { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: rgba(155,89,182,0.4); margin-top: 8px; letter-spacing: 2px; }

    /* ── Camera Mode Indicator ── */
    #cam-mode {
      position: fixed; top: 20px; left: 20px; font-family: 'Orbitron', monospace;
      font-size: 11px; color: rgba(155,89,182,0.3); letter-spacing: 3px;
      z-index: 10; pointer-events: none; display: none;
    }

    /* ── Vignette Effect ── */
    #vignette {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(5,5,16,0.5) 100%);
      pointer-events: none; z-index: 4; display: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-title">INITIALIZING</div>
    <div class="loading-bar-bg"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-text">COPPER-9 SYSTEMS</div>
  </div>

  <!-- Start Screen -->
  <div id="start-screen">
    <div class="start-logo">MURDER DRONES</div>
    <div class="start-subtitle">COPPER-9</div>
    <div class="start-tagline">Sığınağın dışında hayatta kal</div>
    <button id="start-btn">BAŞLA</button>
    <button id="skip-btn" class="skip-button">ATLA</button>
    <button id="explore-btn" class="explore-button">KEŞFET</button>
    <div class="start-controls">
      <span class="key-hint">WASD</span> Hareket &nbsp;&nbsp;
      <span class="key-hint">FARE</span> Nişan &nbsp;&nbsp;
      <span class="key-hint">SOL TIK</span> Pençe &nbsp;&nbsp;
      <span class="key-hint">SAĞ TIK</span> Lazer<br>
      <span class="key-hint">SPACE</span> Zıpla &nbsp;&nbsp;
      <span class="key-hint">SHIFT</span> Koş &nbsp;&nbsp;
      <span class="key-hint">F5</span> Kamera &nbsp;&nbsp;
      <span class="key-hint">F</span> Etkileşim &nbsp;&nbsp;
      <span class="key-hint">E</span> EMP
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-health">
      <span class="health-icon">⚡</span>
      <div class="health-bar-bg"><div class="health-bar" id="health-bar"></div></div>
      <span class="health-text" id="health-text">100</span>
    </div>
    <div class="hud-info">
      <div class="hud-score" id="score-display">0</div>
      <div class="hud-wave" id="wave-display">WAVE 1</div>
      <div class="hud-location" id="location-display">BUNKER — OUTPOST 3</div>
    </div>
    <div class="hud-weapon">
      <div class="weapon-name">PENÇE / LAZER</div>
      <div class="weapon-ammo">∞</div>
    </div>
    <div class="hud-emp">
      <span class="emp-label">EMP</span>
      <div class="emp-bar-bg"><div class="emp-bar" id="emp-bar"></div></div>
    </div>
  </div>

  <!-- Crosshair -->
  <div id="crosshair"><div class="crosshair-dot"></div></div>
  <div id="hit-marker"></div>

  <!-- Vignette -->
  <div id="vignette"></div>

  <!-- Camera Mode -->
  <div id="cam-mode">FPS</div>

  <!-- Story Banner -->
  <div id="story-banner"></div>

  <!-- Game Over -->
  <div id="game-over">
    <div class="go-title">DEVRE DIŞI</div>
    <div class="go-score" id="go-score">SKOR: 0</div>
    <button id="restart-btn">TEKRAR BAŞLA</button>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- Game Scripts -->
  <script src="js/dialogue_ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/npc_characters.js"></script>
  <script src="js/weapons.js"></script>
  <script src="js/environment.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/dialogues.js"></script>
  <script src="js/player.js"></script>

  <script src="js/main.js"></script>
</body>
</html>
